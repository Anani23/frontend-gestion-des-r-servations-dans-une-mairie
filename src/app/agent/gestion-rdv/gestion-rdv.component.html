<div class="management-container">
  <div class="table-header">
    <h2>📅 Planning des Rendez-vous</h2>
    <input type="text" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Rechercher...">
  </div>

  <table class="modern-table">
    <thead>
      <tr>
        <th>Citoyen</th>
        <th>Service</th>
        <th>Date & Heure</th>
        <th>Statut</th>
        <th class="text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of pagedRdvs">
        <td><strong>{{ r.nom }}</strong></td>
        <td><span class="badge-service">{{ r.service }}</span></td>
        <td>{{ r.date | date:'dd MMM yyyy à HH:mm' }}</td>
        <td>
          <span class="status-pill" [ngClass]="r.status.toLowerCase().replace(' ', '-')">
            {{ r.status }}
          </span>
        </td>
        <td class="text-right">
          <button class="btn-valider" (click)="changerStatut(r.id, 'Confirmé')" *ngIf="r.status === 'En attente'">✓</button>
          <button class="btn-annuler" (click)="changerStatut(r.id, 'Annulé')" *ngIf="r.status !== 'Annulé'">✕</button>
          <button class="btn-delete" (click)="supprimer(r.id)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="pagination">
    <button (click)="prevPage()" [disabled]="currentPage === 1">Précédent</button>
    <span>Page {{ currentPage }} / {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">Suivant</button>
  </div>
</div>

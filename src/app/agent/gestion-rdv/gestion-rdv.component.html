<div class="table-container">
  <h2 class="table-title">Gestion des Rendez-vous</h2>

  <!-- Barre de recherche -->
  <input
    type="text"
    placeholder="Rechercher par nom ou service..."
    [(ngModel)]="searchText"
    (input)="applyFilter()"
    class="search-input"
  />

  <table class="styled-table">
    <thead>
      <tr>
        <th (click)="sortColumn('nom')">Nom <span [class.asc]="sortField==='nom' && !sortDesc" [class.desc]="sortField==='nom' && sortDesc"></span></th>
        <th (click)="sortColumn('service')">Service <span [class.asc]="sortField==='service' && !sortDesc" [class.desc]="sortField==='service' && sortDesc"></span></th>
        <th (click)="sortColumn('date')">Date <span [class.asc]="sortField==='date' && !sortDesc" [class.desc]="sortField==='date' && sortDesc"></span></th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of pagedRdvs; let i = index">
        <td>{{ r.nom }}</td>
        <td>{{ r.service }}</td>
        <td>{{ r.date | date:'dd/MM/yyyy' }} à {{ r.date | date:'HH:mm' }}</td>
        <td>
          <span class="status" [ngClass]="r.status.toLowerCase()">{{ r.status }}</span>
        </td>
        <td>
          <button class="btn btn-view">Voir</button>
          <button class="btn btn-edit">Modifier</button>
          <button class="btn btn-delete">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Pagination -->
  <div class="pagination">
    <button class="btn-page" (click)="prevPage()" [disabled]="currentPage === 1">Précédent</button>
    <span>Page {{ currentPage }} / {{ totalPages }}</span>
    <button class="btn-page" (click)="nextPage()" [disabled]="currentPage === totalPages">Suivant</button>
  </div>
</div>

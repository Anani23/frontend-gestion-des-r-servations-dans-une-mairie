<div class="auth-wrapper">
  <div class="auth-image-side">
    <div class="overlay-content">
      <h1>Hôtel de Ville</h1>
      <p>Portail citoyen officiel de la ville de Lomé.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="form-container">
      <header class="form-header">
        <div class="logo-container"><span class="logo-icon">🏛️</span></div>
        <h2>Créer un compte</h2>
      </header>

      <div class="error-msg" *ngIf="errorMessage">
        <p>⚠️ {{ errorMessage }}</p>
      </div>

      <form (ngSubmit)="register()" #registerForm="ngForm" class="auth-form">
        <div class="input-grid">
          <div class="input-group">
            <label>Nom</label>
            <input type="text" [(ngModel)]="nom" name="nom" required placeholder="SOSSOU">
          </div>
          <div class="input-group">
            <label>Prénom</label>
            <input type="text" [(ngModel)]="prenom" name="prenom" required placeholder="Koffi">
          </div>
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="email" name="email" required placeholder="exemple@domaine.tg">
          </div>
          <div class="input-group">
            <label>Téléphone</label>
            <input type="text" [(ngModel)]="telephone" name="telephone" placeholder="+228 90 00 00 00">
          </div>
        </div>

        <div class="input-group">
          <label>Type de compte</label>
          <select [(ngModel)]="role" name="role" required class="role-select">
            <option *ngFor="let roleOption of availableRoles" [value]="roleOption.value">
              {{ roleOption.label }}
            </option>
          </select>
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" [(ngModel)]="password" name="password" required>
          </div>
          <div class="input-group">
            <label>Confirmation</label>
            <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading || !registerForm.valid" class="btn-auth">
          <span *ngIf="!isLoading">S'inscrire</span>
          <span *ngIf="isLoading">Traitement en cours...</span>
        </button>

        <div class="footer-link">
          <p>Déjà inscrit ? <a routerLink="/login">Connectez-vous</a></p>
        </div>
      </form>
    </div>
  </div>
</div>

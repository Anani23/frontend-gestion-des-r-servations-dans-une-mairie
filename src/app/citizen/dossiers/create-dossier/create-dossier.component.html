<div class="create-dossier-wrapper animate-fade-in">
  
  <div class="form-card shadow-lg">
    <header class="form-header">
      <div class="icon-circle">📂</div>
      <div class="header-text">
        <h2>Déposer un Dossier</h2>
        <p>Service d'administration numérique de Lomé</p>
      </div>
    </header>

    <div class="stepper">
      <div class="step" [class.active]="!selectedService">
        <span class="step-num">1</span> Informations générales
      </div>
      <div class="step" [class.active]="selectedService">
        <span class="step-num">2</span> Détails spécifiques
      </div>
    </div>

    <form (ngSubmit)="creerDossier()" #dossierForm="ngForm" class="modern-form">
      
      <div class="form-section">
        <div class="form-group">
          <label>Service municipal <span class="required">*</span></label>
          <select [(ngModel)]="selectedService" name="service" (change)="onServiceChange()" required>
            <option [ngValue]="null" disabled>-- Choisir le service destinataire --</option>
            <option *ngFor="let s of services" [ngValue]="s">{{ s.nom }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Objet du dossier <span class="required">*</span></label>
          <input type="text" [(ngModel)]="type" name="type" placeholder="Ex: Demande de permis de construire" required>
        </div>

        <div class="form-group">
          <label>Commentaires supplémentaires</label>
          <textarea [(ngModel)]="description" name="description" rows="2" placeholder="Précisez votre demande ici..."></textarea>
        </div>
      </div>

      <div *ngIf="selectedService && dynamicFields.length > 0" class="dynamic-section animate-slide-down">
        <div class="dynamic-header">
          <h3>📋 Informations : {{ selectedServiceName }}</h3>
        </div>

        <div class="dynamic-grid">
          <div class="form-group" *ngFor="let f of dynamicFields">
            <label>{{ f.label }} <span *ngIf="f.required" class="required">*</span></label>
            
            <input *ngIf="f.type !== 'textarea'"
              [type]="f.type"
              [(ngModel)]="details[f.key]"
              [name]="f.key"
              [placeholder]="f.placeholder || ''"
              [required]="f.required" />

            <textarea *ngIf="f.type === 'textarea'"
              [(ngModel)]="details[f.key]"
              [name]="f.key"
              [required]="f.required"></textarea>
          </div>
        </div>
      </div>

      <footer class="form-footer">
        <button type="submit" [disabled]="!dossierForm.form.valid" class="btn-primary">
          📤 Soumettre le dossier
        </button>
      </footer>
    </form>

    <div *ngIf="successMessage" class="toast-success">
      {{ successMessage }}
    </div>
  </div>
</div>

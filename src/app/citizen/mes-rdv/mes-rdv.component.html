<div class="rdv">

  <h2>Mes rendez-vous</h2>

  <table class="table-rdv">
    <thead>
      <tr>
        <th>Service</th>
        <th>Date</th>
        <th>Heure</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of paginatedRdvs">
        <td>{{ r.service }}</td>
        <td>{{ r.date }}</td>
        <td>{{ r.heure }}</td>
      </tr>
    </tbody>
  </table>

  <div class="pagination">
    <button (click)="prevPage()" [disabled]="page === 1">Précédent</button>
    <span>Page {{ page }} / {{ Math.ceil(rdvs.length / pageSize) }}</span>
    <button (click)="nextPage()" [disabled]="page * pageSize >= rdvs.length">Suivant</button>
  </div>

</div>

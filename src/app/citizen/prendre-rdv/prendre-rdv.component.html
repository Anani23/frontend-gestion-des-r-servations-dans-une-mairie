<div class="prendre-rdv">

  <h2>Prendre un rendez-vous</h2>

  <form (ngSubmit)="prendreRdv()">

    <div class="form-group">
      <label for="service">Service</label>
      <select id="service" [(ngModel)]="service" name="service" required>
        <option value="" disabled selected>Choisir un service</option>
        <option *ngFor="let s of services" [value]="s">{{ s }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input id="date" type="date" [(ngModel)]="date" name="date" required>
    </div>

    <div class="form-group">
      <label for="heure">Heure</label>
      <input id="heure" type="time" [(ngModel)]="heure" name="heure" required>
    </div>

    <button type="submit" [disabled]="!service || !date || !heure">Prendre RDV</button>

  </form>

</div>

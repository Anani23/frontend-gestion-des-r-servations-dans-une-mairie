<div class="reservations-container">
  <header class="section-header">
    <div class="text">
      <h2 class="title-white">Mes réservations de biens</h2>
      <p class="subtitle-white">Gérez vos réservations d'infrastructures et suivez leur validation.</p>
    </div>
    <button class="btn-reserve-purple" routerLink="/citizen/create-reservation">
      <span>+</span> Réserver un bien
    </button>
  </header>

  <div class="table-responsive" *ngIf="reservations.length > 0; else noReservation">
    <table class="modern-table">
      <thead>
        <tr>
          <th>Bien</th>
          <th>Date</th>
          <th>Localisation</th>
          <th>Statut</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of reservations">
          <td>
            <div class="bien-info">
              <img [src]="'assets/images/' + (r.image || 'default-mairie.jpg')" class="table-img">
              <span class="bien-name">{{ r.bien }}</span>
            </div>
          </td>
          <td>{{ r.date | date:'dd/MM/yyyy' }}</td>
          <td>📍 Lomé, Togo</td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(r.statut)">
              {{ r.statut }}
            </span>
          </td>
          <td class="text-right">
            <button 
              (click)="annuler(r)" 
              [disabled]="r.statut === 'ANNULÉ'" 
              class="btn-cancel"
            >
              ✕ Annuler
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noReservation>
    <div class="empty-view">
      <div class="icon">🏢</div>
      <p>Aucune réservation enregistrée pour le moment.</p>
      <button class="btn-primary" routerLink="/citizen/create-reservation">
        Effectuer ma première réservation
      </button>
    </div>
  </ng-template>
</div>

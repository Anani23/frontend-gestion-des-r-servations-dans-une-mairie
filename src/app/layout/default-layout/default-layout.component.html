<div class="background-slider"></div>

<header class="main-header">
  <app-default-header class="w-100"></app-default-header>
</header>

<nav class="sub-navbar" *ngIf="!isHomePage && !isAuthPage && navItems.length > 0">
  <div class="nav-container">
    <ul class="nav-list">
      <li *ngFor="let item of navItems" class="nav-item">
        <a [routerLink]="[item.url]" routerLinkActive="active-link" class="nav-link">
          <i [class]="item.icon" *ngIf="item.icon" class="me-2"></i>
          <span>{{ item.name }}</span>
        </a>
      </li>
    </ul>
    
    <div class="user-badge">
      <div class="avatar">{{ (authService.getUserName() || 'U').charAt(0).toUpperCase() }}</div>
      <div class="user-info">
        <span class="name">Mairie de Lomé</span>
        <span class="role">{{ role }}</span>
      </div>
    </div>
  </div>
</nav>

<div class="wrapper" [class.full-width]="isHomePage || isAuthPage">
  <main class="main-content">
    <div [class.content-glass]="!isHomePage && !isAuthPage">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-default-footer class="footer-custom"></app-default-footer>
</div>

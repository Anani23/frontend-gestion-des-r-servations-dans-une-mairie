<c-sidebar class="sidebar-custom" unfoldable="true" visible="true">
  <c-sidebar-brand class="sidebar-brand-custom">
    <div class="brand-block">
      <div class="brand-logo">M</div>
      <div class="brand-text">
        <h5>Mairie</h5>
        <span>Administration</span>
      </div>
    </div>
  </c-sidebar-brand>

  <c-sidebar-nav [navItems]="navItems"></c-sidebar-nav>
</c-sidebar>

<div class="wrapper d-flex flex-column min-vh-100">

  <!-- 🔥 HEADER FIX -->
  <div class="header-fixed">
    <app-default-header></app-default-header>
  </div>

  <!-- 🔥 CONTENU -->
  <div class="body flex-grow-1 px-3 py-3">
    <c-container fluid>
      <div class="content-card">
        <router-outlet></router-outlet>
      </div>
    </c-container>
  </div>

  <!-- 🔥 FOOTER -->
  <app-default-footer></app-default-footer>

</div>

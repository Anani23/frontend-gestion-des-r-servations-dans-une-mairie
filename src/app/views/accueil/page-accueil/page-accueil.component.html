<div class="home-page animate-fade-in">
  <section class="hero">
    <div class="hero-slider"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="top-badge">Ville de Lomé • Togo</span>
      <h1>Portail du <span class="accent">Patrimoine</span></h1>
      <p>Modernisation et transparence au service des citoyens de la capitale.</p>
      <div class="hero-actions">
        <button class="btn btn-primary" routerLink="/admin/services">Nos Services</button>
        <button class="btn btn-outline" routerLink="/biens">Explorer le Catalogue</button>
      </div>
    </div>
  </section>

  <section class="stats-grid">
    <div class="stat-item" *ngFor="let s of stats">
      <span class="icon">{{ s.icon }}</span>
      <div class="details">
        <h3>{{ s.value }}</h3>
        <p>{{ s.label }}</p>
      </div>
    </div>
  </section>

  <section class="scroll-section">
    <div class="section-header">
      <h2>Explorer par bien</h2>
      <div class="underline"></div>
    </div>
    <div class="marquee-container">
      <div class="marquee-track">
        <div class="card card-small" *ngFor="let img of [...mairieImages, ...mairieImages, ...mairieImages]">
          <img [src]="img.url" [alt]="img.alt">
          <div class="card-info">
            <h4>{{ img.alt }}</h4>
            <button class="btn-icon" routerLink="/biens">→</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="scroll-section">
    <div class="section-header">
      <h2>Explorer par catégorie</h2>
      <div class="underline"></div>
    </div>
    <div class="marquee-container">
      <div class="marquee-track">
        <div class="card card-large" *ngFor="let c of [...categories, ...categories, ...categories]">
          <img [src]="c.image" [alt]="c.nom">
          <div class="card-overlay">
            <h3>{{ c.nom }}</h3>
            <div class="card-buttons">
              <button class="btn-s btn-blur" [routerLink]="['/biens/categorie', c.link]">Détails</button>
              <button class="btn-s btn-solid" routerLink="/citizen/mes-reservations">Réserver</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="actualites-container">
  <header class="page-header">
    <h1>📢 Centre d'actualités</h1>
    <p>Gérez les informations diffusées aux citoyens de la commune.</p>
  </header>

  <section class="form-section">
    <div class="form-card">
      <h2>Publier une nouvelle</h2>
      <form (ngSubmit)="ajouterActualite()">
        <div class="form-grid">
          <div class="form-group full">
            <label>Titre de l'article *</label>
            <input type="text" [(ngModel)]="titre" name="titre" required placeholder="Ex: Travaux avenue du Palais...">
          </div>

          <div class="form-group">
            <label>Date de publication</label>
            <input type="date" [(ngModel)]="date" name="date">
          </div>

          <div class="form-group">
            <label>Lien de l'image (URL)</label>
            <input type="text" [(ngModel)]="imageUrl" name="imageUrl" placeholder="assets/images/nom-image.jpg">
          </div>

          <div class="form-group full">
            <label>Contenu de l'actualité *</label>
            <textarea [(ngModel)]="description" name="description" required placeholder="Rédigez votre article ici..."></textarea>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <span>🚀</span> Publier maintenant
        </button>
      </form>
    </div>
  </section>

  <section class="list-section">
    <div class="section-title">
      <h2>Dernières publications</h2>
      <span class="count">{{ actualites.length }} articles</span>
    </div>

    <div *ngIf="actualites.length > 0; else emptyState" class="news-grid">
      <article class="news-card" *ngFor="let a of actualites; let i = index">
        <div class="card-image">
          <img [src]="a.image" [alt]="a.titre">
          <div class="date-tag">{{ a.date | date:'dd MMM' }}</div>
        </div>

        <div class="card-body">
          <h3>{{ a.titre }}</h3>
          <p>{{ a.description }}</p>
          
          <div class="card-footer">
            <button class="btn-delete" (click)="supprimerActualite(i)" title="Supprimer">
              🗑️ Supprimer
            </button>
          </div>
        </div>
      </article>
    </div>

    <ng-template #emptyState>
      <div class="empty-box">
        <div class="icon">📭</div>
        <p>Aucun article publié pour le moment.</p>
      </div>
    </ng-template>
  </section>
</div>

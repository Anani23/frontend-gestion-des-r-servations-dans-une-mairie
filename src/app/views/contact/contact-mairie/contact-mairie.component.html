<div class="contact-container">
  <h2>Contactez la Mairie</h2>
  <p>Pour toute question ou demande, veuillez remplir le formulaire ci-dessous.</p>

  <form (ngSubmit)="envoyerMessage()" #contactForm="ngForm" class="contact-form">

    <div class="form-group">
      <label for="nom">Nom complet *</label>
      <input type="text" id="nom" name="nom" [(ngModel)]="nom" required placeholder="Votre nom">
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="exemple@mail.com">
    </div>

    <div class="form-group">
      <label for="objet">Objet *</label>
      <input type="text" id="objet" name="objet" [(ngModel)]="objet" required placeholder="Objet de votre message">
    </div>

    <div class="form-group">
      <label for="message">Message *</label>
      <textarea id="message" name="message" [(ngModel)]="message" required placeholder="Votre message"></textarea>
    </div>

    <button type="submit" [disabled]="!contactForm.form.valid">Envoyer</button>
  </form>

  <div *ngIf="confirmation" class="confirmation">
    Votre message a été envoyé avec succès !
  </div>
</div>

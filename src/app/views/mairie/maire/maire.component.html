<div class="mairie-container">
  <h1>La Mairie</h1>
  <p>{{ descriptionMairie }}</p>

  <section class="maire-section">
    <h2>Le Maire</h2>
    <div class="maire-info">
      <img [src]="maire.photo" alt="Photo du Maire" class="maire-photo">
      <div>
        <p><strong>Nom :</strong> {{ maire.nom }}</p>
        <p><strong>Mandat :</strong> {{ maire.mandat }}</p>
        <p>{{ maire.description }}</p>
      </div>
    </div>
  </section>

  <section class="services-section">
    <h2>Services Municipaux</h2>
    <ul>
      <li *ngFor="let service of services">{{ service }}</li>
    </ul>
  </section>
</div>

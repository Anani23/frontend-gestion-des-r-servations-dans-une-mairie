<div class="organisation-wrapper">
  
  <header class="org-header">
    <h1>🏛️ Organisation Municipale</h1>
    <p>{{ description }}</p>
  </header>

  <section class="org-section">
    <div class="section-title">
      <h2>Pôles d'excellence</h2>
    </div>
    <div class="dept-grid">
      <div class="dept-card" *ngFor="let d of departements" [style.--accent-color]="d.color">
        <div class="dept-icon">{{ d.icone }}</div>
        <h3>{{ d.nom }}</h3>
        <p>{{ d.description }}</p>
      </div>
    </div>
  </section>

  <div class="main-grid">
    <section class="org-section">
      <div class="section-title"><h2>Directoire</h2></div>
      <div class="team-list">
        <div class="team-member" *ngFor="let e of equipes">
          <div class="avatar">{{ e.initiales }}</div>
          <div class="member-info">
            <h4>{{ e.chef }}</h4>
            <p>{{ e.poste }}</p>
          </div>
        </div>
      </div>
    </section>

    <section class="org-section">
      <div class="section-title"><h2>Patrimoine & Actifs</h2></div>
      <div class="biens-list">
        <div class="bien-item" *ngFor="let b of biens">
          <img [src]="b.image" [alt]="b.nom">
          <div class="bien-info">
            <h4>{{ b.nom }}</h4>
            <span class="badge" [class.available]="b.dispo">
              {{ b.dispo ? '● Disponible' : '● Occupé' }}
            </span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="services-footer">
    <h3>Expertises & Services digitaux</h3>
    <div class="tag-cloud">
      <span class="tag" *ngFor="let s of services">{{ s }}</span>
    </div>
  </footer>

</div>

<div class="organisation-container">
  <h1>Organisation de la Mairie</h1>
  <p>{{ description }}</p>

  <section class="departements-section">
    <h2>Départements et Services</h2>
    <ul>
      <li *ngFor="let d of departements">
        <strong>{{ d.nom }}</strong> : {{ d.description }}
      </li>
    </ul>
  </section>

  <section class="equipes-section">
    <h2>Équipes et Responsables</h2>
    <ul>
      <li *ngFor="let e of equipes">
        {{ e.chef }} - {{ e.poste }}
      </li>
    </ul>
  </section>
</div>
